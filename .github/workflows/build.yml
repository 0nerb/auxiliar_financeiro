name: Build Installers

# Quando rodar:
#  - push: a cada envio para a branch main
#  - workflow_dispatch: botão "Run workflow" manual na aba Actions
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------- Instalador do Windows (.exe) ----------
  windows:
    runs-on: windows-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar instalador Windows
        run: npm run dist:win

      - name: Publicar o instalador como artefato
        uses: actions/upload-artifact@v4
        with:
          name: instalador-windows
          path: release/*.exe
          if-no-files-found: error

  # ---------- Instalador do macOS (.dmg) — opcional ----------
  mac:
    runs-on: macos-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar instalador macOS
        run: npm run dist:mac

      - name: Publicar o instalador como artefato
        uses: actions/upload-artifact@v4
        with:
          name: instalador-mac
          path: release/*.dmg
          if-no-files-found: error
